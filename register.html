<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 text-center shadow" style="width:320px; border-radius:10px;">
    <h3 class="mb-3">Register</h3>

    <input type="text" id="username" class="form-control mb-2" placeholder="Username" required>
    <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>
    <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

    <button class="btn btn-success w-100" onclick="register()">Register</button>

    <p class="mt-3 mb-0">
        Already have an account? 
        <a href="login.html">Login</a>
    </p>
</div>

<script src="register.js"></script>
</body>
</html>
