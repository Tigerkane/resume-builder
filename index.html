<!DOCTYPE html>
<html>
<head>
    <title>Resume Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-4">
    <h2 class="text-center">Resume Builder</h2>

    <div class="row">
        <!-- Form -->
        <div class="col-md-5">
            <input type="text" id="name" class="form-control mb-2" placeholder="Full Name">
            <input type="email" id="email" class="form-control mb-2" placeholder="Email">
            <input type="text" id="phone" class="form-control mb-2" placeholder="Phone">
            <textarea id="skills" class="form-control mb-2" placeholder="Skills"></textarea>
            <textarea id="education" class="form-control mb-2" placeholder="Education"></textarea>
            <textarea id="experience" class="form-control mb-2" placeholder="Experience"></textarea>

            <button class="btn btn-primary w-100" onclick="generateResume()">Generate Resume</button>
            <button class="btn btn-success w-100 mt-2" onclick="downloadPDF()">Download PDF</button>
        </div>

        <!-- Resume Preview -->
        <div class="col-md-7">
            <div id="resume" class="p-4 shadow bg-white">
                <h2 id="r-name">Your Name</h2>
                <p id="r-email"></p>
                <p id="r-phone"></p>

                <h4>Skills</h4>
                <p id="r-skills"></p>

                <h4>Education</h4>
                <p id="r-education"></p>

                <h4>Experience</h4>
                <p id="r-experience"></p>
            </div>
        </div>
    </div>
</div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
